# SecureClaw Production Compose
# Security hardening:
# - All services run as non-root UID 10001
# - No capabilities granted
# - read_only: true where applicable
# - Internal network only (no published ports except gateway)
# - mTLS between services via certs/ volume

networks:
  secureclaw-net:
    driver: bridge
    internal: true          # no outbound internet from service network
  gateway-net:
    driver: bridge           # gateway gets both networks

volumes:
  vault-data:
  audit-data:
  skills-data:
  memory-data:
  certs:
    external: true           # generated by scripts/gen-certs.sh before compose up

services:
  # ── Gateway (only externally-accessible service) ──────────────────────────
  gateway:
    build:
      context: .
      dockerfile: docker/gateway.Dockerfile
    networks:
      - gateway-net
      - secureclaw-net
    ports:
      - "127.0.0.1:18789:18789"   # loopback only — no 0.0.0.0 exposure
    environment:
      NODE_ENV: production
      GATEWAY_HOST: "0.0.0.0"
      GATEWAY_PORT: "18789"
      GATEWAY_HMAC_SECRET: "${GATEWAY_HMAC_SECRET:?GATEWAY_HMAC_SECRET is required}"
      AGENT_RUNTIME_ADDR: "agent-runtime:19001"
      AUDIT_ADDR: "audit-system:19003"
    volumes:
      - certs:/app/certs:ro
    read_only: true
    tmpfs:
      - /tmp:size=64m,noexec,nosuid
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:18789/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    depends_on:
      agent-runtime:
        condition: service_healthy

  # ── Agent Runtime ──────────────────────────────────────────────────────────
  agent-runtime:
    build:
      context: .
      dockerfile: docker/agent-runtime.Dockerfile
    networks:
      - secureclaw-net
    environment:
      NODE_ENV: production
      VAULT_ADDR: "credential-vault:19002"
      AUDIT_ADDR: "audit-system:19003"
      SANDBOX_ADDR: "sandbox-runtime:19004"
      SKILLS_ADDR: "skills-engine:19005"
      MEMORY_ADDR: "memory-store:19006"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      GEMINI_API_KEY: "${GEMINI_API_KEY:-}"
      OLLAMA_BASE_URL: "${OLLAMA_BASE_URL:-}"
    volumes:
      - certs:/app/certs:ro
    read_only: true
    tmpfs:
      - /tmp:size=64m,noexec,nosuid
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "const net=require('net');const c=net.connect(19001,'127.0.0.1',()=>{c.destroy();process.exit(0)});c.on('error',()=>process.exit(1));"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s
    depends_on:
      credential-vault:
        condition: service_started
      audit-system:
        condition: service_started
      skills-engine:
        condition: service_started
      memory-store:
        condition: service_started

  # ── Credential Vault ───────────────────────────────────────────────────────
  credential-vault:
    build:
      context: .
      dockerfile: docker/credential-vault.Dockerfile
    networks:
      - secureclaw-net
    environment:
      NODE_ENV: production
      VAULT_MASTER_KEY: "${VAULT_MASTER_KEY:?VAULT_MASTER_KEY is required}"
    volumes:
      - vault-data:/data/vault
      - certs:/app/certs:ro
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

  # ── Audit System ───────────────────────────────────────────────────────────
  audit-system:
    build:
      context: .
      dockerfile: docker/audit-system.Dockerfile
    networks:
      - secureclaw-net
    environment:
      NODE_ENV: production
    volumes:
      - audit-data:/data/audit
      - certs:/app/certs:ro
    read_only: true
    tmpfs:
      - /tmp:size=32m,noexec,nosuid
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

  # ── Skills Engine ──────────────────────────────────────────────────────────
  skills-engine:
    build:
      context: .
      dockerfile: docker/skills-engine.Dockerfile
    networks:
      - secureclaw-net
    environment:
      NODE_ENV: production
      SANDBOX_ADDR: "sandbox-runtime:19004"
      SKILLS_REGISTRY_PATH: /data/skills/registry.json
    volumes:
      - skills-data:/data/skills
      - certs:/app/certs:ro
    read_only: true
    tmpfs:
      - /tmp:size=32m,noexec,nosuid
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    depends_on:
      sandbox-runtime:
        condition: service_started

  # ── Memory Store ───────────────────────────────────────────────────────────
  memory-store:
    build:
      context: .
      dockerfile: docker/memory-store.Dockerfile
    networks:
      - secureclaw-net
    environment:
      NODE_ENV: production
      MEMORY_DATA_DIR: /data/memory
    volumes:
      - memory-data:/data/memory
      - certs:/app/certs:ro
    read_only: true
    tmpfs:
      - /tmp:size=32m,noexec,nosuid
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "const net=require('net');const c=net.connect(19006,'127.0.0.1',()=>{c.destroy();process.exit(0)});c.on('error',()=>process.exit(1));"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s

  # ── Sandbox Runtime ────────────────────────────────────────────────────────
  sandbox-runtime:
    build:
      context: .
      dockerfile: docker/sandbox-runtime.Dockerfile
    networks:
      - secureclaw-net
    environment:
      NODE_ENV: production
      # gVisor required in production — no escape hatch
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - certs:/app/certs:ro
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

  # ── Telegram Channel ────────────────────────────────────────────────────────
  # Start with: docker compose --profile channels up -d
  channel-telegram:
    profiles: ["channels"]
    build:
      context: .
      dockerfile: docker/telegram.Dockerfile
    networks:
      - gateway-net
    environment:
      NODE_ENV: production
      GATEWAY_URL: "http://gateway:18789"
      GATEWAY_HMAC_SECRET: "${GATEWAY_HMAC_SECRET:-}"
      TELEGRAM_BOT_TOKEN: "${TELEGRAM_BOT_TOKEN:-}"
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    depends_on:
      gateway:
        condition: service_healthy

  # ── Slack Channel ───────────────────────────────────────────────────────────
  # Start with: docker compose --profile channels up -d
  channel-slack:
    profiles: ["channels"]
    build:
      context: .
      dockerfile: docker/slack.Dockerfile
    networks:
      - gateway-net
    environment:
      NODE_ENV: production
      GATEWAY_URL: "http://gateway:18789"
      GATEWAY_HMAC_SECRET: "${GATEWAY_HMAC_SECRET:-}"
      SLACK_BOT_TOKEN: "${SLACK_BOT_TOKEN:-}"
      SLACK_APP_TOKEN: "${SLACK_APP_TOKEN:-}"
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    depends_on:
      gateway:
        condition: service_healthy

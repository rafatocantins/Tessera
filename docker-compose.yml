version: "3.9"

# SecureClaw Production Compose
# Security hardening:
# - All services run as non-root UID 10001
# - No capabilities granted
# - read_only: true where applicable
# - Internal network only (no published ports except gateway)
# - mTLS between services via certs/ volume

networks:
  secureclaw-net:
    driver: bridge
    internal: true          # no outbound internet from service network
  gateway-net:
    driver: bridge           # gateway gets both networks

volumes:
  vault-data:
  audit-data:
  certs:
    external: true           # generated by scripts/gen-certs.sh before compose up

services:
  # ── Gateway (only externally-accessible service) ──────────────────────────
  gateway:
    build:
      context: .
      dockerfile: docker/gateway.Dockerfile
    networks:
      - gateway-net
      - secureclaw-net
    ports:
      - "127.0.0.1:18789:18789"   # loopback only — no 0.0.0.0 exposure
    environment:
      NODE_ENV: production
      GATEWAY_HOST: "0.0.0.0"
      GATEWAY_PORT: "18789"
      GATEWAY_HMAC_SECRET: "${GATEWAY_HMAC_SECRET:?GATEWAY_HMAC_SECRET is required}"
      AGENT_RUNTIME_ADDR: "agent-runtime:19001"
      AUDIT_ADDR: "audit-system:19003"
    volumes:
      - certs:/app/certs:ro
    read_only: true
    tmpfs:
      - /tmp:size=64m,noexec,nosuid
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    depends_on:
      agent-runtime:
        condition: service_healthy

  # ── Agent Runtime ──────────────────────────────────────────────────────────
  agent-runtime:
    build:
      context: .
      dockerfile: docker/agent-runtime.Dockerfile
    networks:
      - secureclaw-net
    environment:
      NODE_ENV: production
      VAULT_ADDR: "credential-vault:19002"
      AUDIT_ADDR: "audit-system:19003"
      SANDBOX_ADDR: "sandbox-runtime:19004"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      GEMINI_API_KEY: "${GEMINI_API_KEY:-}"
      OLLAMA_BASE_URL: "${OLLAMA_BASE_URL:-}"
    volumes:
      - certs:/app/certs:ro
    read_only: true
    tmpfs:
      - /tmp:size=64m,noexec,nosuid
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "const net=require('net');const c=net.connect(19001,'127.0.0.1',()=>{c.destroy();process.exit(0)});c.on('error',()=>process.exit(1));"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s
    depends_on:
      credential-vault:
        condition: service_started
      audit-system:
        condition: service_started

  # ── Credential Vault ───────────────────────────────────────────────────────
  credential-vault:
    build:
      context: .
      dockerfile: docker/credential-vault.Dockerfile
    networks:
      - secureclaw-net
    environment:
      NODE_ENV: production
      VAULT_MASTER_KEY: "${VAULT_MASTER_KEY:?VAULT_MASTER_KEY is required}"
    volumes:
      - vault-data:/data/vault
      - certs:/app/certs:ro
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

  # ── Audit System ───────────────────────────────────────────────────────────
  audit-system:
    build:
      context: .
      dockerfile: docker/audit-system.Dockerfile
    networks:
      - secureclaw-net
    environment:
      NODE_ENV: production
    volumes:
      - audit-data:/data/audit
      - certs:/app/certs:ro
    read_only: true
    tmpfs:
      - /tmp:size=32m,noexec,nosuid
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

  # ── Sandbox Runtime ────────────────────────────────────────────────────────
  sandbox-runtime:
    build:
      context: .
      dockerfile: docker/sandbox-runtime.Dockerfile
    networks:
      - secureclaw-net
    environment:
      NODE_ENV: production
      # gVisor required in production — no escape hatch
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - certs:/app/certs:ro
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SecureClaw WebChat</title>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; connect-src ws://127.0.0.1:18789 http://127.0.0.1:18789; style-src 'self' 'unsafe-inline';" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, -apple-system, sans-serif; background: #0f0f0f; color: #e0e0e0; height: 100vh; display: flex; flex-direction: column; }
    header { padding: 12px 16px; background: #1a1a1a; border-bottom: 1px solid #333; display: flex; align-items: center; gap: 12px; }
    header h1 { font-size: 16px; font-weight: 600; color: #fff; }
    #status { font-size: 12px; padding: 2px 8px; border-radius: 12px; background: #333; color: #999; }
    #status.connected { background: #1a3a1a; color: #4caf50; }
    #status.error { background: #3a1a1a; color: #f44336; }
    #messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
    .message { max-width: 80%; padding: 10px 14px; border-radius: 12px; line-height: 1.5; font-size: 14px; }
    .message.user { align-self: flex-end; background: #1a3a5a; color: #e0f0ff; }
    .message.assistant { align-self: flex-start; background: #1a1a1a; border: 1px solid #333; color: #e0e0e0; white-space: pre-wrap; }
    .message.system { align-self: center; background: #2a2a1a; border: 1px solid #554; color: #cc0; font-size: 12px; padding: 6px 12px; }
    .message.error { align-self: center; background: #2a1a1a; border: 1px solid #544; color: #f44336; font-size: 12px; padding: 6px 12px; }
    .message.approval { align-self: center; background: #1a2a3a; border: 1px solid #456; color: #89d; padding: 12px 16px; }
    .approval-buttons { display: flex; gap: 8px; margin-top: 8px; }
    .approval-buttons button { padding: 6px 16px; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; }
    .btn-approve { background: #2a4a2a; color: #4caf50; }
    .btn-deny { background: #4a2a2a; color: #f44336; }
    .tool-info { font-size: 11px; color: #888; margin-top: 4px; }
    #input-area { padding: 12px 16px; border-top: 1px solid #333; background: #1a1a1a; display: flex; gap: 8px; }
    #setup { padding: 16px; background: #1a1a2a; border-bottom: 1px solid #334; display: flex; flex-direction: column; gap: 8px; }
    #setup label { font-size: 12px; color: #888; }
    #setup input { padding: 8px; background: #111; border: 1px solid #333; border-radius: 6px; color: #e0e0e0; font-size: 13px; font-family: monospace; }
    #connect-btn { padding: 8px 16px; background: #1a3a5a; color: #89d; border: 1px solid #456; border-radius: 6px; cursor: pointer; font-size: 13px; }
    #message-input { flex: 1; padding: 10px 14px; background: #111; border: 1px solid #333; border-radius: 8px; color: #e0e0e0; font-size: 14px; outline: none; resize: none; height: 44px; }
    #message-input:focus { border-color: #456; }
    #send-btn { padding: 10px 20px; background: #1a3a5a; color: #89d; border: 1px solid #456; border-radius: 8px; cursor: pointer; font-size: 14px; }
    #send-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .cost-info { font-size: 11px; color: #666; text-align: right; padding: 4px 8px; }
  </style>
</head>
<body>
  <header>
    <h1>SecureClaw WebChat</h1>
    <span id="status">disconnected</span>
  </header>

  <div id="setup">
    <label for="token-input">Bearer Token (from `secureclaw token generate`)</label>
    <input type="password" id="token-input" placeholder="paste your token here" autocomplete="off" />
    <label for="session-input">Session ID (from `secureclaw session create`)</label>
    <input type="text" id="session-input" placeholder="session UUID" autocomplete="off" />
    <button id="connect-btn" onclick="connect()">Connect</button>
  </div>

  <div id="messages"></div>
  <div id="input-area" style="display:none">
    <textarea id="message-input" placeholder="Type a message... (Shift+Enter for newline)" rows="1"></textarea>
    <button id="send-btn" onclick="sendMessage()">Send</button>
  </div>

  <script>
    let ws = null;
    let sessionId = null;
    let currentAssistantEl = null;

    function connect() {
      const token = document.getElementById('token-input').value.trim();
      sessionId = document.getElementById('session-input').value.trim();

      if (!token || !sessionId) {
        addMessage('system', 'Token and Session ID are required.');
        return;
      }

      setStatus('connecting...');

      // Note: WebSocket browser API doesn't support custom headers.
      // We use a protocol-based auth approach for browser WebSocket.
      // The actual Bearer token is sent as the Sec-WebSocket-Protocol header.
      // The gateway parses it from the first subprotocol value.
      ws = new WebSocket(`ws://127.0.0.1:18789/api/v1/chat/${sessionId}`, [`bearer.${token}`]);

      ws.onopen = () => {
        setStatus('connected', true);
        document.getElementById('setup').style.display = 'none';
        document.getElementById('input-area').style.display = 'flex';
        document.getElementById('message-input').focus();
        addMessage('system', 'Connected to SecureClaw gateway.');
      };

      ws.onmessage = (event) => {
        try {
          const msg = JSON.parse(event.data);
          handleServerMessage(msg);
        } catch (e) {
          console.error('Failed to parse server message:', e);
        }
      };

      ws.onclose = () => {
        setStatus('disconnected');
        addMessage('system', 'Connection closed.');
        document.getElementById('input-area').style.display = 'none';
        document.getElementById('setup').style.display = 'flex';
      };

      ws.onerror = () => {
        setStatus('error', false, true);
        addMessage('error', 'WebSocket error. Check that the gateway is running on 127.0.0.1:18789.');
      };
    }

    function handleServerMessage(msg) {
      switch (msg.type) {
        case 'chunk':
          appendToAssistant(msg.delta);
          break;
        case 'tool_pending':
          finalizeAssistant();
          if (msg.requires_approval) {
            addApprovalRequest(msg.call_id, msg.tool_id, msg.description);
          } else {
            addMessage('system', `🔧 Executing tool: ${msg.tool_id}`);
          }
          break;
        case 'tool_result':
          addMessage('system', `${msg.success ? '✓' : '✗'} Tool ${msg.tool_id} (${msg.duration_ms}ms)`);
          break;
        case 'injection_warning':
          addMessage('error', `⚠️ INJECTION ATTEMPT DETECTED\n${msg.excerpt}`);
          break;
        case 'complete':
          finalizeAssistant();
          if (msg.cost_usd > 0) {
            addMessage('system', `Cost: $${msg.cost_usd.toFixed(4)} (${msg.input_tokens + msg.output_tokens} tokens)`);
          }
          break;
        case 'error':
          addMessage('error', `Error [${msg.code}]: ${msg.message}`);
          break;
        case 'pong':
          break;
      }
    }

    function appendToAssistant(delta) {
      if (!currentAssistantEl) {
        currentAssistantEl = document.createElement('div');
        currentAssistantEl.className = 'message assistant';
        document.getElementById('messages').appendChild(currentAssistantEl);
      }
      currentAssistantEl.textContent += delta;
      scrollToBottom();
    }

    function finalizeAssistant() {
      currentAssistantEl = null;
    }

    function addApprovalRequest(callId, toolId, description) {
      const el = document.createElement('div');
      el.className = 'message approval';
      el.id = `approval-${callId}`;
      el.innerHTML = `
        <strong>⚠️ Approval Required</strong>
        <div class="tool-info">Tool: <code>${escapeHtml(toolId)}</code></div>
        <div>${escapeHtml(description)}</div>
        <div class="approval-buttons">
          <button class="btn-approve" onclick="respond('${escapeHtml(callId)}', true)">Approve</button>
          <button class="btn-deny" onclick="respond('${escapeHtml(callId)}', false)">Deny</button>
        </div>
      `;
      document.getElementById('messages').appendChild(el);
      scrollToBottom();
    }

    function respond(callId, approved) {
      if (!ws || ws.readyState !== WebSocket.OPEN) return;
      ws.send(JSON.stringify({ type: 'approve', session_id: sessionId, call_id: callId, approved }));
      const el = document.getElementById(`approval-${callId}`);
      if (el) {
        el.innerHTML = `<strong>${approved ? '✓ Approved' : '✗ Denied'}</strong>: ${el.querySelector('.tool-info').textContent}`;
        el.style.opacity = '0.6';
      }
    }

    function addMessage(type, text) {
      finalizeAssistant();
      const el = document.createElement('div');
      el.className = `message ${type}`;
      el.textContent = text;
      document.getElementById('messages').appendChild(el);
      scrollToBottom();
    }

    function sendMessage() {
      const input = document.getElementById('message-input');
      const content = input.value.trim();
      if (!content || !ws || ws.readyState !== WebSocket.OPEN) return;
      addMessage('user', content);
      ws.send(JSON.stringify({ type: 'message', session_id: sessionId, content }));
      input.value = '';
      input.style.height = '44px';
    }

    function setStatus(text, connected = false, error = false) {
      const el = document.getElementById('status');
      el.textContent = text;
      el.className = connected ? 'connected' : error ? 'error' : '';
    }

    function scrollToBottom() {
      const msgs = document.getElementById('messages');
      msgs.scrollTop = msgs.scrollHeight;
    }

    function escapeHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    document.getElementById('message-input').addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });
  </script>
</body>
</html>

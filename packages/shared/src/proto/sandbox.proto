syntax = "proto3";
package secureclaw.sandbox.v1;

// SandboxService: secure tool execution via gVisor containers.
// CRITICAL: All tool execution happens in isolated gVisor containers by default.
service SandboxService {
  // Check if gVisor runtime is available and healthy
  rpc CheckRuntime(CheckRuntimeRequest) returns (CheckRuntimeResponse);
  // Execute a tool in a sandboxed container
  rpc RunTool(RunToolRequest) returns (RunToolResponse);
  // Force-stop a running container (e.g., on timeout or approval denial)
  rpc StopContainer(StopContainerRequest) returns (StopContainerResponse);
  // Stream logs from a container (for debugging, controlled access)
  rpc GetContainerLogs(GetContainerLogsRequest) returns (stream LogChunk);
}

message CheckRuntimeRequest {}

message CheckRuntimeResponse {
  bool gvisor_available = 1;
  string runtime_name = 2;      // "runsc" | "runc-dev-only"
  string docker_version = 3;
  bool ready = 4;
  string error_message = 5;     // Set if not ready
}

message RunToolRequest {
  string call_id = 1;           // Unique identifier for this tool call
  string tool_id = 2;           // Human-readable tool name
  string image = 3;             // Docker image to use (pre-approved images only)
  string input_json = 4;        // Tool input with credentials already injected by vault
  int32 timeout_seconds = 5;    // Hard limit (default 60)
  ResourceLimits limits = 6;
  // env_vars: ONLY non-secret environment variables allowed here.
  // Credentials must be injected into input_json by the vault, not passed as env vars.
  repeated string env_vars = 7;
  // network_mode: "none" (default) | "restricted" (allowlisted domains only)
  string network_mode = 8;
  repeated string allowed_domains = 9;  // Only relevant when network_mode = "restricted"
}

message ResourceLimits {
  int64 memory_bytes = 1;    // Default 256 MB
  double cpu_shares = 2;     // Default 0.5 (50% of one core)
  int64 pids_limit = 3;      // Default 64
}

message RunToolResponse {
  string container_id = 1;
  int32 exit_code = 2;
  string stdout = 3;
  string stderr = 4;
  int32 duration_ms = 5;
  bool timed_out = 6;
  bool oom_killed = 7;
}

message StopContainerRequest {
  string container_id = 1;
  int32 timeout_seconds = 2;  // Grace period before SIGKILL (default 5)
}

message StopContainerResponse {
  bool success = 1;
}

message GetContainerLogsRequest {
  string container_id = 1;
  bool follow = 2;
  int32 tail_lines = 3;
}

message LogChunk {
  bytes data = 1;
  string stream = 2;   // "stdout" | "stderr"
  bool is_last = 3;
}

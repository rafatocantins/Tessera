name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

# Cancel in-flight runs for the same PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"
  PNPM_VERSION: "latest"

jobs:
  # ── Security gate: block .env files and hardcoded secrets ─────────────────
  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for git-leaks

      - name: Check for .env files committed
        run: |
          if git ls-files | grep -E '(^|/)\.env(\.|$)'; then
            echo "ERROR: .env file detected in repository"
            exit 1
          fi

      - name: Check for hardcoded API keys (heuristic)
        run: |
          # Fail if any file outside of test/fixtures contains likely API key patterns
          if git ls-files | xargs grep -l --include="*.ts" --include="*.js" --include="*.json" \
            -E '(sk-[A-Za-z0-9]{20,}|AIza[A-Za-z0-9_-]{35}|Bearer [A-Za-z0-9._-]{20,})' \
            2>/dev/null | grep -v 'test\|spec\|fixture\|\.md$'; then
            echo "ERROR: Potential hardcoded secret found"
            exit 1
          fi
          echo "No hardcoded secrets detected"

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Install + typecheck + lint ─────────────────────────────────────────────
  quality:
    name: Quality (${{ matrix.package }})
    runs-on: ubuntu-latest
    needs: secret-scan
    strategy:
      matrix:
        package:
          - shared
          - credential-vault
          - audit-system
          - input-sanitizer
          - sandbox-runtime
          - agent-runtime
          - skills-engine
          - memory-store
          - gateway
          - channel-webchat
          - channel-telegram
          - channel-slack
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared (dependency)
        if: matrix.package != 'shared'
        run: pnpm --filter @secureclaw/shared build

      - name: Typecheck ${{ matrix.package }}
        run: pnpm --filter "@secureclaw/${{ matrix.package }}" typecheck

      - name: Lint ${{ matrix.package }}
        run: pnpm --filter "@secureclaw/${{ matrix.package }}" lint
        continue-on-error: false

  # ── Unit tests ─────────────────────────────────────────────────────────────
  test:
    name: Tests (${{ matrix.package }})
    runs-on: ubuntu-latest
    needs: quality
    strategy:
      matrix:
        package:
          - shared
          - audit-system
          - input-sanitizer
          - agent-runtime
          - skills-engine
          - memory-store
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared
        if: matrix.package != 'shared'
        run: pnpm --filter @secureclaw/shared build

      - name: Run tests (${{ matrix.package }})
        run: pnpm --filter "@secureclaw/${{ matrix.package }}" test

      - name: Upload coverage
        uses: codecov/codecov-action@v5
        if: always()
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  # ── npm audit ──────────────────────────────────────────────────────────────
  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    needs: secret-scan
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit dependencies
        run: pnpm audit --audit-level=high

  # ── Docker build + Trivy scan ──────────────────────────────────────────────
  docker:
    name: Docker (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: [quality, test]
    if: github.event_name == 'push'
    strategy:
      matrix:
        service:
          - gateway
          - agent-runtime
          - credential-vault
          - audit-system
          - sandbox-runtime
          - skills-engine
          - memory-store
          - telegram
          - slack
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (${{ matrix.service }})
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/${{ matrix.service }}.Dockerfile
          push: false
          tags: secureclaw/${{ matrix.service }}:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
          outputs: type=docker

      - name: Scan for vulnerabilities (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: secureclaw/${{ matrix.service }}:ci
          format: sarif
          output: trivy-${{ matrix.service }}.sarif
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true

      - name: Upload Trivy results to Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-${{ matrix.service }}.sarif
          category: trivy-${{ matrix.service }}

  # ── Tool image builds + Trivy scan ────────────────────────────────────────
  docker-tools:
    name: Docker Tool (${{ matrix.tool }})
    runs-on: ubuntu-latest
    needs: secret-scan
    if: github.event_name == 'push'
    strategy:
      matrix:
        tool:
          - shell-exec
          - http-request
          - file-read
          - file-write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build tool image (${{ matrix.tool }})
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/tool-${{ matrix.tool }}.Dockerfile
          push: false
          tags: secureclaw/${{ matrix.tool }}:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
          outputs: type=docker

      - name: Scan for vulnerabilities (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: secureclaw/${{ matrix.tool }}:ci
          format: sarif
          output: trivy-tool-${{ matrix.tool }}.sarif
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true

      - name: Upload Trivy results to Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-tool-${{ matrix.tool }}.sarif
          category: trivy-tool-${{ matrix.tool }}

  # ── Full monorepo build verification ──────────────────────────────────────
  build-all:
    name: Full Build
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm -r build

      - name: Validate config schema
        run: |
          node -e "
            import('@secureclaw/shared').then(({ SecureClawConfigSchema }) => {
              const cfg = JSON.parse(require('fs').readFileSync('config/defaults.json', 'utf-8'));
              SecureClawConfigSchema.parse(cfg);
              console.log('Config schema valid');
            });
          "
        continue-on-error: true  # ESM dynamic import in CI may need adjustment

  # ── Integration tests (Docker Compose + mock LLM) ─────────────────────────
  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [build-all]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm -r build

      - name: Build tool images for integration tests
        run: bash scripts/build-tools.sh

      - name: Run integration tests
        run: pnpm --filter @secureclaw/integration test
        env:
          GATEWAY_HMAC_SECRET: integration-test-secret
          VAULT_MASTER_KEY: integration-test-vault-key

      - name: Dump container logs on failure
        if: failure()
        run: |
          docker compose -f docker-compose.dev.yml \
            -f packages/integration/docker-compose.test.yml \
            logs --no-color --tail=200
        env:
          GATEWAY_HMAC_SECRET: integration-test-secret
          VAULT_MASTER_KEY: integration-test-vault-key

  # ── docker-compose validate ────────────────────────────────────────────────
  compose-validate:
    name: Compose Validate
    runs-on: ubuntu-latest
    needs: secret-scan
    steps:
      - uses: actions/checkout@v4
      - name: Validate docker-compose.yml syntax
        run: docker compose -f docker-compose.yml config --quiet
